<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイカルチャー・ダッシュボード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    header {
      background: var(--header-bg, linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%));
      color: white; padding: 24px 32px;
      display: grid; grid-template-columns: minmax(180px, auto) 1fr minmax(160px, auto);
      align-items: center; gap: 20px;
      transition: background 0.5s;
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .header-title-row { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
    .header-date { font-size: 28px; font-weight: 800; letter-spacing: 0.03em; opacity: 0.95; margin-top: 2px; }
    .header-day { font-size: 12px; opacity: 0.6; margin-top: 1px; }
    .meta { font-size: 12px; opacity: 0.6; margin-top: 2px; }
    .header-center { display: flex; align-items: center; justify-content: center; gap: 14px; }
    .header-quote-robot { font-size: 42px; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
    .header-quote-bubble { position: relative; background: rgba(255,255,255,0.13); border-radius: 16px; border-bottom-left-radius: 4px; padding: 10px 16px; color: white; font-size: 13px; font-style: italic; line-height: 1.6; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.22); width: 100%; }
    .header-quote-bubble::before { content: ''; position: absolute; left: -8px; bottom: 10px; border-width: 5px 8px 5px 0; border-style: solid; border-color: transparent rgba(255,255,255,0.13) transparent transparent; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .badge { background: rgba(255,255,255,0.2); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; backdrop-filter: blur(4px); }
    .weather-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); border-radius: 16px; padding: 8px 16px; backdrop-filter: blur(4px); }
    .weather-icon { font-size: 28px; line-height: 1; }
    .weather-info { display: flex; flex-direction: column; }
    .weather-temp { font-size: 22px; font-weight: 800; line-height: 1; }
    .weather-desc { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .summary-card { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .summary-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .summary-card.c1 { border-color: #2e9e5b; }
    .summary-card.c2 { border-color: #e94560; }
    .summary-card.c3 { border-color: #0f3460; }
    .summary-card.c4 { border-color: #9b59b6; }
    .count { font-size: 36px; font-weight: 700; }
    .c1 .count { color: #2e9e5b; }
    .c2 .count { color: #e94560; }
    .c3 .count { color: #0f3460; }
    .c4 .count { color: #9b59b6; }
    .clabel { font-size: 13px; color: #888; margin-top: 2px; }

    .section { margin-bottom: 28px; }
    .sec-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sec-header h2 { font-size: 16px; font-weight: 700; }
    .stag { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600; color: white; }
    .stag.t1 { background: #2e9e5b; }
    .stag.t2 { background: #e94560; }
    .stag.t3 { background: #0f3460; }
    .stag.t4 { background: #9b59b6; }

    .news-list { display: flex; flex-direction: column; gap: 12px; }
    .news-card { background: white; border-radius: 10px; padding: 16px 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; gap: 16px; align-items: flex-start; }
    .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .i1 { background: #eafaf0; }
    .i2 { background: #fff0f3; }
    .i3 { background: #eef2ff; }
    .i4 { background: #f6effa; }
    .nbody { flex: 1; }
    .ntitle { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px; }
    .ndesc  { font-size: 12px; color: #666; line-height: 1.6; }
    .nfoot  { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .nsrc   { font-size: 11px; color: #aaa; }
    .pill   { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .p1 { background: #eafaf0; color: #2e9e5b; }
    .p2 { background: #fff0f3; color: #e94560; }
    .p3 { background: #eef2ff; color: #0f3460; }
    .p4 { background: #f6effa; color: #9b59b6; }
    .empty { color: #bbb; font-size: 13px; padding: 16px; }

    .insight-box { border-radius: 10px; padding: 16px 20px; margin-top: 14px; display: flex; gap: 12px; align-items: flex-start; }
    .insight-box.ib1 { background: #f0fbf4; border-left: 4px solid #2e9e5b; }
    .insight-box.ib2 { background: #fff8f0; border-left: 4px solid #e94560; }
    .insight-box.ib3 { background: #f0f4ff; border-left: 4px solid #0f3460; }
    .insight-box.ib4 { background: #f9f0fc; border-left: 4px solid #9b59b6; }
    .insight-label { font-size: 11px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.05em; }
    .ib1 .insight-label { color: #2e9e5b; }
    .ib2 .insight-label { color: #e94560; }
    .ib3 .insight-label { color: #0f3460; }
    .ib4 .insight-label { color: #9b59b6; }
    .insight-text { font-size: 13px; color: #444; line-height: 1.7; }

    .trend-banner { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: white; padding: 12px 32px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
    .trend-banner strong { color: #f5a623; margin-right: 4px; }


    footer { text-align: center; padding: 24px; font-size: 12px; color: #bbb; }

    @media (max-width: 640px) {
      header { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
      .header-date { font-size: 20px; }
      header h1 { font-size: 16px; }
      .header-center { order: 3; width: 100%; justify-content: flex-start; gap: 10px; }
      .header-quote-bubble { font-size: 12px; flex: 1; }
      .header-quote-robot { font-size: 30px; }
      .header-right { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; order: 2; }
      .weather-temp { font-size: 18px; }
      .weather-icon { font-size: 22px; }
      .container { padding: 16px 12px; }
      .summary-grid { grid-template-columns: 1fr; gap: 10px; }
      .count { font-size: 28px; }
      .news-card { padding: 12px 14px; gap: 10px; }
      .icon { width: 32px; height: 32px; font-size: 16px; }
      .ntitle { font-size: 13px; }
      .ndesc { font-size: 11px; }
      .nfoot { flex-wrap: wrap; gap: 6px; }
      .trend-banner { padding: 10px 16px; font-size: 12px; }
      .insight-box { padding: 12px 14px; }
      .insight-text { font-size: 12px; }
    }
  </style>
</head>
<body>
<header id="main-header">
  <div class="header-left">
    <div class="header-title-row">
      <span id="season-icon" style="font-size:28px;">🌈</span>
      <h1>マイカルチャー・ダッシュボード</h1>
    </div>
    <div class="header-date" id="header-date"></div>
    <div class="header-day" id="header-day"></div>
    <div class="meta" id="updated-at">読み込み中...</div>
  </div>
  <div class="header-center" id="header-quote-row" style="visibility:hidden">
    <div class="header-quote-bubble" id="quote-text"></div>
    <div class="header-quote-robot">🤖</div>
  </div>
  <div class="header-right">
    <span class="badge">毎朝 自動更新</span>
    <div class="weather-box" id="weather-box" style="display:none">
      <div class="weather-icon" id="weather-icon">⛅</div>
      <div class="weather-info">
        <div class="weather-temp" id="weather-temp">--°</div>
        <div class="weather-desc" id="weather-desc">東京</div>
      </div>
    </div>
  </div>
</header>
<div class="trend-banner" id="trend-banner" style="display:none">
  <span>📈</span><span id="trend-text"></span>
</div>

<div class="container">
  <div class="summary-grid">
    <div class="summary-card c1" onclick="document.getElementById('section1').scrollIntoView({behavior:'smooth'})"><div class="count" id="cnt1">-</div><div class="clabel">🎾 テニス</div><div id="keywords1" style="margin-top:8px;font-size:12px;color:#2e9e5b;line-height:1.8;"></div><span id="new1" style="display:none;font-size:11px;font-weight:700;color:white;background:#2e9e5b;padding:2px 10px;border-radius:20px;margin-top:4px;"></span></div>
    <div class="summary-card c2" onclick="document.getElementById('section2').scrollIntoView({behavior:'smooth'})"><div class="count" id="cnt2">-</div><div class="clabel">🎵 音楽</div><div id="keywords2" style="margin-top:8px;font-size:12px;color:#e94560;line-height:1.8;"></div><span id="new2" style="display:none;font-size:11px;font-weight:700;color:white;background:#e94560;padding:2px 10px;border-radius:20px;margin-top:4px;"></span></div>
    <div class="summary-card c3" onclick="document.getElementById('section3').scrollIntoView({behavior:'smooth'})"><div class="count" id="cnt3">-</div><div class="clabel">💻 ガジェット・AI</div><div id="keywords3" style="margin-top:8px;font-size:12px;color:#0f3460;line-height:1.8;"></div><span id="new3" style="display:none;font-size:11px;font-weight:700;color:white;background:#0f3460;padding:2px 10px;border-radius:20px;margin-top:4px;"></span></div>
    <div class="summary-card c4" onclick="document.getElementById('section4').scrollIntoView({behavior:'smooth'})"><div class="count" id="cnt4">-</div><div class="clabel">🎨 アート・お出かけ・旅行</div><div id="keywords4" style="margin-top:8px;font-size:12px;color:#9b59b6;line-height:1.8;"></div><span id="new4" style="display:none;font-size:11px;font-weight:700;color:white;background:#9b59b6;padding:2px 10px;border-radius:20px;margin-top:4px;"></span></div>
  </div>

  <div class="section" id="section1">
    <div class="sec-header"><h2>🎾 テニス</h2><span class="stag t1">ATP/WTA・国内大会</span></div>
    <div class="news-list" id="list1"></div>
    <div class="insight-box ib1" id="insight1" style="display:none">
      <div style="flex:1"><div class="insight-label">📌 注目ポイント</div><div class="insight-text" id="insight1-text"></div></div>
    </div>
  </div>
  <div class="section" id="section2">
    <div class="sec-header"><h2>🎵 音楽</h2><span class="stag t2">サカナクション 他</span></div>
    <div class="news-list" id="list2"></div>
    <div class="insight-box ib2" id="insight2" style="display:none">
      <div style="flex:1"><div class="insight-label">📌 注目ポイント</div><div class="insight-text" id="insight2-text"></div></div>
    </div>
  </div>
  <div class="section" id="section3">
    <div class="sec-header"><h2>💻 ガジェット・AI</h2><span class="stag t3">新製品・AI動向</span></div>
    <div class="news-list" id="list3"></div>
    <div class="insight-box ib3" id="insight3" style="display:none">
      <div style="flex:1"><div class="insight-label">📌 注目ポイント</div><div class="insight-text" id="insight3-text"></div></div>
    </div>
  </div>
  <div class="section" id="section4">
    <div class="sec-header"><h2>🎨 アート・お出かけ・旅行</h2><span class="stag t4">展覧会・川崎/鶴見・旅行</span></div>
    <div class="news-list" id="list4"></div>
    <div class="insight-box ib4" id="insight4" style="display:none">
      <div style="flex:1"><div class="insight-label">💡 おすすめの過ごし方</div><div class="insight-text" id="insight4-text"></div></div>
    </div>
  </div>
</div>
<footer>マイカルチャー・ダッシュボード — 毎朝自動更新</footer>

<script>
// 月ごとのテーマ
const MONTH_THEMES = {
  1:  { icon: '⛄', bg: 'linear-gradient(135deg, #1a1a2e 0%, #2d4a7a 60%, #4a90d9 100%)', label: '睦月' },
  2:  { icon: '🌸', bg: 'linear-gradient(135deg, #2d1b3d 0%, #7b3f6e 60%, #e88fb0 100%)', label: '如月' },
  3:  { icon: '🌸', bg: 'linear-gradient(135deg, #1a2d1a 0%, #3d7a4a 60%, #88d9a0 100%)', label: '弥生' },
  4:  { icon: '🌷', bg: 'linear-gradient(135deg, #2d1a2d 0%, #7a3d6e 60%, #d988c8 100%)', label: '卯月' },
  5:  { icon: '🌿', bg: 'linear-gradient(135deg, #1a2d1a 0%, #2d6b3d 60%, #5db870 100%)', label: '皐月' },
  6:  { icon: '📡', bg: 'linear-gradient(135deg, #2a1a3e 0%, #4a2d6b 60%, #7b5ea8 100%)', label: '水無月' },
  7:  { icon: '🌻', bg: 'linear-gradient(135deg, #2d2000 0%, #7a5500 60%, #e8a800 100%)', label: '文月' },
  8:  { icon: '🌊', bg: 'linear-gradient(135deg, #001a2d 0%, #004a7a 60%, #0088d9 100%)', label: '葉月' },
  9:  { icon: '🍂', bg: 'linear-gradient(135deg, #2d1a00 0%, #7a4400 60%, #d98800 100%)', label: '長月' },
  10: { icon: '🍁', bg: 'linear-gradient(135deg, #2d1000 0%, #8b3300 60%, #d95b00 100%)', label: '神無月' },
  11: { icon: '🍄', bg: 'linear-gradient(135deg, #1a1a1a 0%, #4a3520 60%, #8b6b40 100%)', label: '霜月' },
  12: { icon: '❄️', bg: 'linear-gradient(135deg, #0d1b2d 0%, #1e3a5f 60%, #4a7fb5 100%)', label: '師走' },
};

const WEATHER_CODES = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};

// ヘッダーの季節テーマ＆日付を設定
function setupHeader() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const theme = MONTH_THEMES[month];
  document.getElementById('main-header').style.background = theme.bg;
  document.getElementById('season-icon').innerHTML = theme.icon;
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  document.getElementById('header-date').textContent =
    `${now.getFullYear()}年${month}月${now.getDate()}日`;
  document.getElementById('header-day').textContent =
    `${days[now.getDay()]}曜日　${theme.label}`;
}

// 東京の天気をOpen-Meteoから取得（APIキー不要）
async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&current=temperature_2m,weathercode&timezone=Asia/Tokyo');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    const icon = WEATHER_CODES[code] || '🌡️';
    document.getElementById('weather-icon').textContent = icon;
    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-desc').textContent = '東京　現在';
    document.getElementById('weather-box').style.display = 'flex';
  } catch(e) { /* 取得失敗時は非表示のまま */ }
}

setupHeader();
loadWeather();

const SECTIONS = [
  { id: '1', icon: '🎾', iconCls: 'i1', pillCls: 'p1' },
  { id: '2', icon: '🎵', iconCls: 'i2', pillCls: 'p2' },
  { id: '3', icon: '💻', iconCls: 'i3', pillCls: 'p3' },
  { id: '4', icon: '🎨', iconCls: 'i4', pillCls: 'p4' }
];

function isNew(dateStr) {
  const d = new Date(dateStr.replace(/\//g, '-'));
  const diff = (new Date() - d) / (1000 * 60 * 60 * 24);
  return diff <= 3;
}

function stars(score) {
  if (!score) return '';
  const filled = '★'.repeat(score);
  const empty = '☆'.repeat(3 - score);
  const color = score === 3 ? '#e94560' : score === 2 ? '#f5a623' : '#aaa';
  return `<span style="color:${color};font-size:13px;margin-left:6px;vertical-align:middle;">${filled}${empty}</span>`;
}

function card(item, s) {
  const newBadge = isNew(item.date) ? '<span style="background:#e94560;color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:8px;vertical-align:middle;">NEW</span>' : '';
  const highlight = item.score === 3 ? 'border-left:3px solid #e94560;' : '';
  return `<div class="news-card" style="${highlight}">
    <div class="icon ${s.iconCls}">${s.icon}</div>
    <div class="nbody">
      <div class="ntitle">${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px solid #ccc;">${item.title}</a>` : item.title}${stars(item.score)}${newBadge}</div>
      <div class="ndesc">${item.summary}</div>
      <div class="nfoot">
        <span class="nsrc">${item.source} ／ ${item.date}</span>
        <span class="pill ${s.pillCls}">${item.tag}</span>
      </div>
    </div>
  </div>`;
}

function render(data) {
  document.getElementById('updated-at').textContent = '最終更新: ' + data.updated_at;
  const quoteRow = document.getElementById('header-quote-row');
  if (data.quote) {
    document.getElementById('quote-text').textContent = '「' + data.quote + '」';
    quoteRow.style.visibility = 'visible';
  }
  const trendBanner = document.getElementById('trend-banner');
  if (data.trend_summary) {
    document.getElementById('trend-text').innerHTML = '<strong>今日のトレンド：</strong>' + data.trend_summary;
    trendBanner.style.display = 'flex';
  } else {
    trendBanner.style.display = 'none';
  }
  const keys = ['tennis', 'music', 'tech', 'culture'];
  const insightKeys = ['tennis_insight', 'music_insight', 'tech_insight', 'culture_insight'];
  const keywordKeys = ['tennis_keywords', 'music_keywords', 'tech_keywords', 'culture_keywords'];
  keys.forEach((key, i) => {
    const items = data[key] || [];
    const s = SECTIONS[i];
    const newCount = items.filter(item => isNew(item.date)).length;
    document.getElementById('cnt' + s.id).textContent = items.length;
    const keywords = data[keywordKeys[i]] || [];
    document.getElementById('keywords' + s.id).textContent = keywords.map(k => '#' + k).join('　');
    const newEl = document.getElementById('new' + s.id);
    if (newCount > 0) {
      newEl.textContent = 'うち NEW ' + newCount + '件';
      newEl.style.display = 'inline';
    } else {
      newEl.style.display = 'none';
    }
    document.getElementById('list' + s.id).innerHTML = items.length
      ? items.map(item => card(item, s)).join('')
      : '<div class="empty">本日は該当情報がありません</div>';
    const insight = data[insightKeys[i]];
    const insightBox = document.getElementById('insight' + s.id);
    if (insight) {
      document.getElementById('insight' + s.id + '-text').textContent = insight;
      insightBox.style.display = 'flex';
    } else {
      insightBox.style.display = 'none';
    }
  });
}

const SAMPLE = {
  updated_at: "サンプルデータ",
  tennis: [
    { title: "サンプル: 全豪オープン開幕", summary: "サンプルデータです。実際のデータは毎朝更新されます。", source: "サンプル", date: "2026/01/01", tag: "ATPツアー", score: 1 }
  ],
  music: [
    { title: "サンプル: サカナクション新ツアー発表", summary: "サンプルデータです。実際のデータは毎朝更新されます。", source: "サンプル", date: "2026/01/01", tag: "ライブ", score: 1 }
  ]
};

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const total = (data.tennis||[]).length + (data.music||[]).length + (data.tech||[]).length + (data.culture||[]).length;
    render(total > 0 ? data : SAMPLE);
  })
  .catch(() => render(SAMPLE));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Boost</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #14161c;
      color: #f3f1ec;
    }
    a { color: inherit; }

    .page { max-width: 640px; margin: 0 auto; padding: 0 0 60px; }

    header { padding: 28px 20px 18px; }
    .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .brand { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: #8b8f9b; text-transform: uppercase; }
    .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5c7a; }
    .date-big { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; margin-top: 8px; }
    .date-sub { font-size: 13px; color: #8b8f9b; margin-top: 4px; }
    .weather-pill {
      display: flex; align-items: center; gap: 6px; background: #1f232c; border: 1px solid #2c3140;
      border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: #f3f1ec; flex-shrink: 0;
    }

    .quote {
      margin: 18px 20px 0; padding: 14px 18px; border-radius: 14px;
      background: #1f232c; border: 1px solid #2c3140; font-size: 13px; font-style: italic;
      color: #c7cad3; line-height: 1.8;
    }

    .search-wrap { padding: 18px 20px 0; }
    .search-box { display: flex; gap: 8px; }
    .search-box input {
      flex: 1; border: 1px solid #2c3140; outline: none; font-size: 14px; background: #1f232c;
      color: #f3f1ec; border-radius: 999px; padding: 12px 18px;
    }
    .search-box input::placeholder { color: #6b6f7b; }
    .search-box button {
      border: none; cursor: pointer; border-radius: 999px; padding: 12px 22px;
      font-size: 13px; font-weight: 700; color: #14161c; background: #ffd166;
    }
    .search-box button:active { transform: scale(0.97); }

    .filters { display: flex; gap: 8px; padding: 16px 20px 0; overflow-x: auto; }
    .filter-chip {
      flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 7px 16px; border-radius: 999px;
      border: 1px solid #2c3140; background: #1f232c; color: #c7cad3; cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .filter-chip.active { background: #f3f1ec; color: #14161c; border-color: #f3f1ec; }
    .filter-chip .swatch { width: 8px; height: 8px; border-radius: 50%; }

    .feed { padding: 18px 20px 0; display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: #1c1f27; border-radius: 18px; padding: 18px 20px;
      border-left: 4px solid var(--accent); position: relative;
    }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .cat-tag { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase; }
    .cat-tag i { font-size: 14px; }
    .card-date { font-size: 11px; color: #6b6f7b; }
    .new-flag { font-size: 10px; font-weight: 800; color: #14161c; background: var(--accent); padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
    .card-title { font-size: 16px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
    .card-title a { text-decoration: none; }
    .card-title a:hover { text-decoration: underline; }
    .card-desc { font-size: 13px; color: #9fa3ad; line-height: 1.75; }
    .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 10px; }
    .card-source { font-size: 11px; color: #6b6f7b; }
    .more-btn {
      font-size: 11px; font-weight: 700; color: #c7cad3; background: #262a34; border: 1px solid #323845;
      border-radius: 999px; padding: 6px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .more-btn:hover { background: #323845; }

    .acc-tennis { --accent: #4ce0a0; }
    .acc-music  { --accent: #ff5c7a; }
    .acc-tech   { --accent: #5c9dff; }
    .acc-culture{ --accent: #ffd166; }

    .empty { text-align: center; color: #6b6f7b; font-size: 13px; padding: 40px 20px; }

    footer { text-align: center; padding: 30px 20px 0; font-size: 11px; color: #4d5160; }

    @media (max-width: 480px) {
      .date-big { font-size: 28px; }
      header { padding: 22px 16px 14px; }
      .quote, .search-wrap, .filters, .feed { padding-left: 16px; padding-right: 16px; }
      .card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="top-row">
      <div>
        <div class="brand"><span class="dot"></span>Day Boost</div>
        <div class="date-big" id="header-date"></div>
        <div class="date-sub" id="updated-at">読み込み中...</div>
      </div>
      <div class="weather-pill" id="weather-box" style="display:none">
        <span id="weather-icon"></span><span id="weather-temp"></span>
      </div>
    </div>
  </header>

  <div class="quote" id="quote-row" style="display:none">
    <span id="quote-text"></span>
  </div>

  <div class="search-wrap">
    <form class="search-box" id="search-form">
      <input type="text" id="search-input" placeholder="気になることを検索...">
      <button type="submit"><i class="ti ti-search" aria-hidden="true"></i></button>
    </form>
  </div>

  <div class="filters" id="filters">
    <div class="filter-chip active" data-filter="all">すべて</div>
    <div class="filter-chip" data-filter="tennis"><span class="swatch" style="background:#4ce0a0"></span>テニス</div>
    <div class="filter-chip" data-filter="music"><span class="swatch" style="background:#ff5c7a"></span>音楽</div>
    <div class="filter-chip" data-filter="tech"><span class="swatch" style="background:#5c9dff"></span>ガジェット・AI</div>
    <div class="filter-chip" data-filter="culture"><span class="swatch" style="background:#ffd166"></span>アート・旅</div>
  </div>

  <div class="feed" id="feed"></div>

  <footer>Day Boost — 毎朝自動更新</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css"></script>
<script>
const WEATHER_CODES = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};

const CATS = {
  tennis:  { label: 'テニス',       icon: 'ti-ball-tennis',     cls: 'acc-tennis' },
  music:   { label: '音楽',         icon: 'ti-music',           cls: 'acc-music' },
  tech:    { label: 'ガジェット・AI', icon: 'ti-device-laptop', cls: 'acc-tech' },
  culture: { label: 'アート・旅',     icon: 'ti-beach',          cls: 'acc-culture' }
};

function setupHeader() {
  const now = new Date();
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  document.getElementById('header-date').textContent =
    `${now.getMonth()+1}月${now.getDate()}日(${days[now.getDay()]})`;
}

async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&current=temperature_2m,weathercode&timezone=Asia/Tokyo');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    document.getElementById('weather-icon').textContent = WEATHER_CODES[code] || '🌡️';
    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-box').style.display = 'flex';
  } catch(e) {}
}

setupHeader();
loadWeather();

document.getElementById('search-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
});

function searchFor(text) {
  window.open('https://www.google.com/search?q=' + encodeURIComponent(text), '_blank');
}

function isNew(dateStr) {
  const d = new Date(String(dateStr).replace(/\//g, '-'));
  const diff = (new Date() - d) / (1000 * 60 * 60 * 24);
  return diff <= 3;
}

function parseDate(dateStr) {
  const t = new Date(String(dateStr).replace(/\//g, '-')).getTime();
  return isNaN(t) ? 0 : t;
}

function card(item, catKey) {
  const cat = CATS[catKey];
  const newFlag = isNew(item.date) ? '<span class="new-flag">NEW</span>' : '';
  const titleEsc = (item.title || '').replace(/'/g, "\\'");
  return `<div class="card ${cat.cls}">
    <div class="card-top">
      <div class="cat-tag"><i class="${cat.icon}" aria-hidden="true"></i>${cat.label}${newFlag}</div>
      <div class="card-date">${item.date || ''}</div>
    </div>
    <div class="card-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>
    <div class="card-desc">${item.summary || ''}</div>
    <div class="card-foot">
      <div class="card-source">${item.source || ''}</div>
      <button class="more-btn" onclick="searchFor('${titleEsc}')"><i class="ti ti-search" aria-hidden="true"></i>もっと調べる</button>
    </div>
  </div>`;
}

let ALL_ITEMS = [];
let CURRENT_FILTER = 'all';

function renderFeed() {
  const feed = document.getElementById('feed');
  const items = CURRENT_FILTER === 'all' ? ALL_ITEMS : ALL_ITEMS.filter(i => i.cat === CURRENT_FILTER);
  feed.innerHTML = items.length
    ? items.map(i => card(i, i.cat)).join('')
    : '<div class="empty">本日は該当情報がありません</div>';
}

document.getElementById('filters').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  CURRENT_FILTER = chip.dataset.filter;
  renderFeed();
});

function render(data) {
  document.getElementById('updated-at').textContent = '最終更新 ' + data.updated_at;
  if (data.quote) {
    document.getElementById('quote-text').textContent = '“ ' + data.quote + ' ”';
    document.getElementById('quote-row').style.display = 'block';
  }
  ALL_ITEMS = [];
  Object.keys(CATS).forEach(key => {
    (data[key] || []).forEach(item => ALL_ITEMS.push(Object.assign({ cat: key }, item)));
  });
  ALL_ITEMS.sort((a, b) => {
    const scoreDiff = (b.score || 0) - (a.score || 0);
    if (scoreDiff !== 0) return scoreDiff;
    return parseDate(b.date) - parseDate(a.date);
  });
  renderFeed();
}

const SAMPLE = {
  updated_at: 'サンプルデータ',
  tennis: [{ title: 'サンプル記事', summary: '実際のデータは毎朝更新されます。', source: 'サンプル', date: '2026/01/01', score: 1, url: '#' }]
};

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const total = Object.keys(CATS).reduce((sum, k) => sum + (data[k]||[]).length, 0);
    render(total > 0 ? data : SAMPLE);
  })
  .catch(() => render(SAMPLE));
</script>
</body>
</html>
